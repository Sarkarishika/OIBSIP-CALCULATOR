<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Basic Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <section class="calculator" aria-label="Calculator">
      <div class="display-panel">
        <div class="display" id="display" aria-live="polite">0</div>
      </div>

      <div class="button-grid">
        <button class="btn btn-muted" data-action="clear">AC</button>
        <button class="btn btn-muted" data-action="delete">DEL</button>
        <button class="btn btn-muted" data-value="%">%</button>
        <button class="btn btn-operator" data-value="/">&divide;</button>

        <button class="btn" data-value="7">7</button>
        <button class="btn" data-value="8">8</button>
        <button class="btn" data-value="9">9</button>
        <button class="btn btn-operator" data-value="*">&times;</button>

        <button class="btn" data-value="4">4</button>
        <button class="btn" data-value="5">5</button>
        <button class="btn" data-value="6">6</button>
        <button class="btn btn-operator" data-value="-">&minus;</button>

        <button class="btn" data-value="1">1</button>
        <button class="btn" data-value="2">2</button>
        <button class="btn" data-value="3">3</button>
        <button class="btn btn-operator" data-value="+">+</button>

        <button class="btn btn-zero" data-value="0">0</button>
        <button class="btn" data-value=".">.</button>
        <button class="btn btn-equals" data-action="calculate">=</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
